name: Vaad Staging deployment

# Run this Build for all pushes to 'main' branch, or tagged releases.
on:
    push:
        branches:
            - main

    # Allows you to run this workflow manually from the Actions tab
    workflow_dispatch:

env:
    SHORT_SHA: $(echo ${{ github.sha }} | cut -c 1-8)

jobs:
    docker:
        runs-on: ubuntu-latest
        steps:
            - name: Set up QEMU
              uses: docker/setup-qemu-action@v2

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  push: true
                  tags: gbengstar/vaad-backend:latest

            - name: Call render and Update
              run: curl https://api.render.com/deploy/srv-d6tdqg75gffc7393pnk0?key=cbJqkdqQBLg
